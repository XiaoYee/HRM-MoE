# Backbone config
n_layers: 32

hidden_size: 1536
num_heads: 12  # head size 128, min(2, hidden_size // 128)
expansion: 4

norm_type: pre  # TODO: Try different type of norms. Note that learning rate is dependent of norm type and init scale.
norm_eps: 1e-6

rope_theta: 10000.0
pos_emb_type: rope

# Simple Lecun Normal works better than Megatron init.
# NOTE: Maybe larger init increases non-residual contribution, and layers are more effective?
init_type: lecun_normal

# Qwen-style 64x8 MoE with single-node expert parallelism.
# On an 8-rank job each rank owns 8 experts. Token dispatch/combine uses
# all_to_all; expert parameters are excluded from FSDP so they stay local.
moe_num_experts: 64
moe_top_k: 8
moe_intermediate_size: 512
moe_norm_topk_prob: true
moe_router_aux_loss_coef: 0.001
moe_implementation: grouped_ep
moe_expert_in_one_shard: 1
